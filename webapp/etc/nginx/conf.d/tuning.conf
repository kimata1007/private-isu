#open_file_cache max=10000 inactive=60s;
#open_file_cache_valid 60s;
#open_file_cache_min_uses 1;
#open_file_cache_errors off;

# Client-side keepalive: reuse benchmarker connections to cut TCP/handshake churn
keepalive_timeout 65s;
keepalive_requests 100000;

# gzip for text responses only (transfer-encoding; decompressed content is identical)
# Low comp_level keeps CPU cheap on 2 vCPU. Images are excluded (already compressed).
gzip_comp_level 1;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types text/css text/javascript application/javascript application/json;
