upstream app {
  server unix:/tmp/isu-go.sock;
  keepalive 64;
}

server {
  listen 80;
  access_log /var/log/nginx/access.log ltsv;

  client_max_body_size 10m;
  root /home/isucon/private_isu/webapp/public/;

  location = /favicon.ico { expires 1d; access_log off; }

  # 静的アセットは nginx が直接配信
  location ~ ^/(css|js|img)/ {
    expires 1d;
    access_log off;
    # Coalesce packets for sendfile-served static assets (paired with tcp_nodelay)
    tcp_nopush on;
  }

  # 投稿画像: ファイルがあれば nginx が配信、無ければアプリが生成して返す
  location /image/ {
    expires 1d;
    try_files $uri @app;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_pass http://app;
  }

  location @app {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_pass http://app;
  }
}
